name: Build ZCE EM BK7238

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  APP_NAME: ${{ github.event.repository.name }}

jobs:
  refs:
    name: Prepare CI Environment
    runs-on: ubuntu-22.04
    outputs:
      sha_short: ${{ steps.refs.outputs.sha_short }}
      short_ref: ${{ steps.refs.outputs.short_ref }}
      version: ${{ steps.refs.outputs.version }}
    steps:
      - name: Source checkout
        uses: actions/checkout@v4

      - name: Set outputs
        id: refs
        run: |
          export BRANCH=${GITHUB_REF#refs/*/}
          echo "branch: ${BRANCH}"
          export BRANCHTRANSLATED=$(echo ${BRANCH} | tr '/' '_')
          echo "short_ref: ${BRANCHTRANSLATED}"
          export VERSION=${BRANCHTRANSLATED}_$(git rev-parse --short=12 HEAD)
          echo "short_ref=${BRANCHTRANSLATED}" >> $GITHUB_OUTPUT
          echo "sha_short=SHA-$(git rev-parse --short=12 HEAD)" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  build_bk7238:
    name: Build ZCE EM BK7238
    needs: refs
    runs-on: ubuntu-22.04

    steps:
      - name: Source checkout
        uses: actions/checkout@v4

      - name: Show repository root
        run: |
          pwd
          ls -la
          test -f Makefile

      - name: Build OpenBK7238 target
        run: |
          make APP_VERSION=${{ needs.refs.outputs.version }} APP_NAME=OpenBK7238 VARIANT="default" OpenBK7238

      - name: List build output
        if: always()
        run: |
          find output -maxdepth 3 -type f | sort || true

      - name: Upload BK7238 build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ZCE_EM_BK7238_${{ needs.refs.outputs.version }}
          path: |
            output/${{ needs.refs.outputs.version }}/OpenBK7238_*
            output/${{ needs.refs.outputs.version }}/*.bin
            output/${{ needs.refs.outputs.version }}/*.rbl
            output/${{ needs.refs.outputs.version }}/*.img
            output/${{ needs.refs.outputs.version }}/*.ota
          if-no-files-found: warn

          
